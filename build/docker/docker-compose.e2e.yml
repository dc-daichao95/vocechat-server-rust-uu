# VoceChat server + nginx reverse proxy (E2E-ready deploy)
# Obfuscation (REALITY etc.) is intentionally NOT included — run an edge proxy in front if needed.
#
#   cd vocechat-server-rust-uu
#   docker compose -f build/docker/docker-compose.e2e.yml up -d --build
#
# Server listens on 127.0.0.1:3000 inside the network; nginx exposes 80/443.

version: "3.8"

services:
  vocechat:
    image: vocechat-server:latest
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.linux
    container_name: vocechat-server
    command:
      - "--network.bind"
      - "0.0.0.0:3000"
      - "--network.domain"
      - "${DOMAIN:-localhost}"
      - "--network.tls.type"
      - "none"
    volumes:
      - vocechat-data:/home/vocechat-server/data
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - vocechat-net

  nginx:
    image: nginx:1.25-alpine
    container_name: vocechat-nginx
    depends_on:
      - vocechat
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - vocechat-data:/var/vocechat-data:ro
    restart: unless-stopped
    networks:
      - vocechat-net

volumes:
  vocechat-data:

networks:
  vocechat-net:
    driver: bridge
